{% extends 'base.html' %}
{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-box">
        <h2>Edit Product</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="text" name="name" value="{{ product.name }}" placeholder="Product Name" required>
            <input type="text" name="category" value="{{ product.category }}" placeholder="Category" required>
            <input type="number" name="price" value="{{ product.price }}" placeholder="Price" required>
            <input type="number" name="stock" value="{{ product.stock }}" placeholder="Stock" required>
            <label style="margin-bottom:0.5rem; display:block;">Current Image:</label>
            <img src="{{ url_for('static', filename='uploads/' ~ product.image) }}" alt="{{ product.name }}" style="width:100%; max-height:180px; object-fit:cover; border-radius:10px; margin-bottom:1rem;">
            <input type="file" name="image">
            <button type="submit">Save Changes</button>
        </form>
        <a href="{{ url_for('admin') }}" style="display:inline-block; margin-top:1rem; color:#f23c91;">Back to Admin</a>
    </div>
</div>
{% endblock %}
