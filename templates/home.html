{% extends "base.html" %}
{% block title %}Home | Maximise{% endblock %}
{% block content %}
<div class="container">
    <div class="filters">
        <form method="get">
            <input type="text" name="search" placeholder="Search products..." value="{{ request.args.get('search') }}">
            <select name="category" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if request.args.get('category')==cat.id|string %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </form>
    </div>
    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <img src="{{ product.cover_image }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p class="price">₦{{ product.price }}</p>
            <a href="{{ url_for('product_detail', id=product.id) }}" class="btn">View Details</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
